# ------------------- MySQL -------------------
# Railway usa las variables de entorno para HOST, USER, PASSWORD y DATABASE.
# Al usar los prefijos de Spring, estas variables se inyectan automáticamente.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------- JPA / Hibernate -------------------
# Una vez que la base de datos esté migrada (lo que ya hiciste), se recomienda
# dejar 'ddl-auto' en 'none' o 'update' (como lo tienes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ------------------- Logging -------------------
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ------------------- Server -------------------
# El puerto 8080 es el puerto estándar que Railway expone automáticamente.
server.port=8080
server.servlet.context-path=/gandersync