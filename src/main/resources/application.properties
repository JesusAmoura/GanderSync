# ------------------- MySQL -------------------
# Railway inyecta de forma segura el HOST, USER, PASSWORD y DATABASE a través
# de estas variables de entorno, evitando credenciales hardcodeadas en el código.
# Se añaden parámetros para asegurar la conexión en entornos de nube:
# 1. useSSL=false: Evita errores de handshake.
# 2. allowPublicKeyRetrieval=true: Soluciona el error de clave pública.
# 3. rewriteBatchedStatements=true: Optimiza el rendimiento.
spring.datasource.url=${SPRING_DATASOURCE_URL}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------- JPA / Hibernate -------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Se elimina la definición explícita del dialecto ya que Hibernate lo detecta.

# ------------------- Logging -------------------
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ------------------- Server -------------------
# Puerto que Railway expone automáticamente.
server.port=8080
server.servlet.context-path=/gandersync